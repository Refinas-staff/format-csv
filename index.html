<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSV整形ツール</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-mark">CSV</div>
        <div>
          <h1>CSV整形ツール</h1>
          <p>整形パターンを選んで、CSVを変換します。</p>
        </div>
      </header>

      <section class="panel">
        <h2>1. 整形パターン</h2>
        <div id="patternList" class="pattern-list"></div>
      </section>

      <section class="panel">
        <h2>2. ファイル</h2>
        <label class="field-label" for="encodingSelect">文字コード</label>
        <select id="encodingSelect">
          <option value="auto">自動判定</option>
          <option value="utf-8">UTF-8</option>
          <option value="shift_jis">Shift_JIS</option>
        </select>

        <label class="file-drop" for="fileInput">
          <span class="file-drop-title">CSV / TSVを選択</span>
          <span id="fileName" class="file-drop-sub">まだ選択されていません</span>
          <input id="fileInput" type="file" accept=".csv,.tsv,text/csv,text/tab-separated-values" />
        </label>

        <div class="button-grid">
          <button id="convertButton" class="button primary">整形する</button>
          <button id="downloadCsvButton" class="button secondary" disabled>CSVをダウンロード</button>
          <button id="downloadExcelButton" class="button excel" disabled>Excelをダウンロード</button>
          <button id="resetButton" class="button ghost">リセット</button>
        </div>
        <div id="status" class="status">整形パターンとファイルを選択してください。</div>
      </section>

      <section class="panel">
        <h2>3. 選択中の条件</h2>
        <div id="patternInfo" class="pattern-info"></div>
      </section>
    </aside>

    <main class="main">
      <section class="preview-card">
        <div class="preview-header">
          <div>
            <h2 id="previewTitle">プレビュー</h2>
            <p id="previewNote">整形後のデータがここに表示されます。セルは直接編集できます。</p>
          </div>
          <div id="previewBadge" class="preview-badge">0行</div>
        </div>
        <div id="sheetTabs" class="sheet-tabs"></div>
        <div id="previewArea" class="preview-area empty">
          CSVを整形すると、ここにプレビューが表示されます。
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="./patterns.js"></script>
  <script src="./app.js"></script>
</body>
</html>
